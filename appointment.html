<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment <form action=""></form></title>
</head>
<body>
<section class="appointment-section">
    <h2>Book an Appointment</h2>
    <form class="appointment-form">

        <div class="mb-3">
            <label class="form-label">Owner Name</label>
            <input type="text" class="form-control" placeholder="Enter your name">
        </div>

        <div class="mb-3">
            <label class="form-label">Pet Name</label>
            <input type="text"  class="form-control" placeholder="Enter pet name">
        </div>

    <div class="mb-3">
    <label>Type of pet </label>
    <select class="form-select">
        <option>Dog</option>
        <option>Cat</option>
        <option>Rabbit</option>
        <option>Bird</option>
    </select>
</div>

<div class="mb-3">
    <label>What service do you need?</label>
    <select class="form-select">
        <option>Vaccination</option>
        <option>Checkup</option>
        <option>Grooming</option>
        <option>Deworming</option>
        <option>Veterinary Services</option>
        <option>Laboratory Services</option>
        <option>Animal Wellness Check</option>
        <option>Emergency Care</option>
    </select>
    <div class="mb-3">
            <label class="form-label">Appointment Date</label>
            <input type="date" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Any issue/ any thing to add </label>
            <textarea class="form-control" rows="4" placeholder="Any thing to add"></textarea>
        </div>

        <button type="submit" class="btn btn-success"> Book Appointment </button>
    </form>
</section>
</div>

</body>
</html>
