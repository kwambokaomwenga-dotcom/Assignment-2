<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: linear-gradient(
        135deg,
        #f8f3eb 0%,
        #f2ece2 50%,
        #ede5d8 100%
    );

    min-height:100vh;
    font-family: Georgia, serif;
    color:#4a3f35;
}

.appointment-section{
    max-width:700px;
    margin:60px auto;
    padding:20px;
}

.appointment-section h2{
    text-align:center;
    margin-bottom:30px;
    color:#6b5c4a;
}

form{
    background:rgba(245,235,218,0.9);
    padding:35px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.form-label{
    color:#6b5c4a;
    font-weight:bold;
}

.form-control,
.form-select{
    border-radius:10px;
    border:1px solid #d8c9b4;
}

.form-control:focus,
.form-select:focus{
    border-color:#c8a96e;
    box-shadow:0 0 5px rgba(200,169,110,0.4);
}

.btn-success{
    background:#c8a96e;
    border:none;
    width:100%;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
}

.btn-success:hover{
    background:#b89356;
}
</style>
</head>
<body>
<section class="appointment-section">
    <h2>Book an Appointment</h2>
    <form class="appointment-form">

        <div class="mb-3">
            <label class="ownerName" class="form-label">Owner Name</label>
            <input type="text" class="form-control" id="ownername" placeholder="Enter your name" recquired>
        </div>

        <div class="mb-3">
            <label class="petName" class="form-label">Pet Name</label>
            <input type="text" class="form-control" id ="Pet Name" placeholder="Enter pet name" recquired>
        </div>

    <div class="mb-3">
    <label>Type of pet </label>
    <select class="form-select">
        <option>Dog</option>
        <option>Cat</option>
        <option>Rabbit</option>
        <option>Bird</option>
    </select>
</div>

<div class="mb-3">
    <label>What service do you need?</label>
    <select class="form-select">
         <option>Adoption</option>
        <option>Vaccination</option>
        <option>Checkup</option>
        <option>Grooming</option>
        <option>Deworming</option>
        <option>Veterinary Services</option>
        <option>Laboratory Services</option>
        <option>Animal Wellness Check</option>
        <option>Emergency Care</option>
    </select>
</div>

    <div class="mb-3">
            <label class="Appointment Date" class="form-label">Appointment Date</label>
            <input type="date" class="form-control" id="Appointment Date">
        </div>

        <div class="mb-3">
            <label  class="Anything to add" class="form-label">Any issue/ any thing to add </label>
            <textarea class="form-control" rows="4" placeholder="Any thing to add"></textarea>
        </div>

        <button type="submit" class="btn btn-success"> Book Appointment </button>
    </form>
</section>
<footer style="margin-top:40px; padding:20px; text-align:center; color:#7a6a5a;">
    <p>&copy; 2026 Happy Tails. All Rights Reserved.</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
