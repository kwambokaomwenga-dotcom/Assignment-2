<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
   <h3>How To Reach Us?</h3> 
   <p>To get in much with us you can find us in diffrent social platforms,email address also our physical shop</p>

<div class="form-card">
    <h1>Send Feedback</h1>
    <p class="page-sub">Write, then save as a draft or publish when ready <span class="star-accent">✦</span></p>

    <form id="Feedback" novalidate>

        <div class="row mb-3">
            <div class="col-md-7 mb-3 mb-md-0">
                <label for="name">Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Enter Name" required><br>
            </div>
            <div class="col-md-5">
                <label for="email">Email Address</label>
                <input type="text" class="form-control" id="email" name="email" placeholder="Enter your email address" required><br><br>
            </div>
        </div>

        <div class="mb-3">
            <label for="message">Message</label>
            <textarea class="form-control" id="message" name="message" placeholder="Write your message here..." required></textarea>
        </div>

        <hr class="soft-divider">

        <div class="action-row">
            <button type="button" class="btn-draft" onclick="handlePost('draft')">Save as Draft</button>
            <button type="reset" class="btn-clear" onclick="clearStatus()">Clear form</button>
        </div>

        <div class="status-bar" id="statusBar"></div>

</form>
</div>
</body>
</html>
